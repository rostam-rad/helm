<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict CSP: PRD §7.3 promises zero outbound network traffic by default.
      Fonts are vendored via @fontsource (imported in main.tsx). 'unsafe-inline'
      is on style-src because Tailwind injects inline <style> tags at runtime —
      CSP cannot block that without breaking Tailwind. It is NOT on script-src,
      because that would defeat the point of having a CSP at all (XSS).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'; connect-src 'self'; img-src 'self' data:;"
    />
    <title>Helm</title>
    <!-- Sets data-theme synchronously before the React bundle to avoid a flash. -->
    <script src="./theme-bootstrap.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
